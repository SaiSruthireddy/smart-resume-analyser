<!DOCTYPE html>
<html>
<head>
    <title>Resume Analysis Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 30px;
            width: 60%;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
        }
        .score {
            font-size: 24px;
            color: green;
            margin: 20px 0;
        }
        .suggestions {
            text-align: left;
            margin-top: 20px;
        }
        ul 
        {
            padding-left: 20px;
        }
        li 
        {
            margin: 8px 0;
        }
        .back-btn 
        {
            margin-top: 25px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .back-btn:hover 
        {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Analysis Result</h1>
        <div class="score">
            Your Resume Score: {{ score }} / 100
        </div>
        <div class="suggestions">
            <h3>Suggestions to Improve:</h3>

            {% if suggestions %}
                <ul>
                    {% for suggestion in suggestions %}
                        <li>{{ suggestion }}</li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>Great job! Your resume contains all important keywords 🎉</p>
            {% endif %}
        </div>
        <a href="/" class="back-btn">Analyze Another Resume</a>
    </div>
</body>
</html>
